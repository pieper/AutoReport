name: Weekly Research Report

on:
  schedule:
    # Runs at 08:00 UTC every Monday
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      topic_filter:
        description: 'Optional: filename of a single topic to process (e.g. ai_trends.md). Leave blank to process all topics.'
        required: false
        default: ''

jobs:
  generate-reports:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_report.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated report update: $(date -u +'%Y-%m-%d')"
            git push
          fi
